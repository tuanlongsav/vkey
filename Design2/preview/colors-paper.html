<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 200px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet {
    width: 100%; height: 100%;
    background: var(--paper-0);
    border: 1px solid var(--ink-500);
    padding: 16px 22px 18px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0 22px;
    align-content: start;
  }
  .stamp {
    border-right: 1px solid var(--ink-500);
    padding-right: 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer {
    margin-top: auto; padding-top: 6px;
    border-top: 1px solid var(--paper-300);
    display: flex; gap: 16px; align-items: baseline;
  }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·C2</div>
      <div class="name">Bone.</div>
      <div class="meta">Paper neutrals — canvas + low-noise greys</div>
    </div>
    <div class="body">
      
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
    
      <div>
        <div style="background:#FFFFFF;height:56px;border:1px solid var(--ink-500);"></div>
        <div style="margin-top:5px;font:500 11px/1.2 var(--font-sans);color:var(--ink-500);">0</div>
        <div style="font:500 10px/1.2 var(--font-mono);color:var(--paper-500);margin-top:1px;">#FFFFFF</div>
      </div>
      <div>
        <div style="background:#F7F5EF;height:56px;border:1px solid var(--ink-500);"></div>
        <div style="margin-top:5px;font:500 11px/1.2 var(--font-sans);color:var(--ink-500);">50</div>
        <div style="font:500 10px/1.2 var(--font-mono);color:var(--paper-500);margin-top:1px;">#F7F5EF</div>
      </div>
      <div>
        <div style="background:#EEEAE0;height:56px;border:1px solid var(--ink-500);"></div>
        <div style="margin-top:5px;font:500 11px/1.2 var(--font-sans);color:var(--ink-500);">100</div>
        <div style="font:500 10px/1.2 var(--font-mono);color:var(--paper-500);margin-top:1px;">#EEEAE0</div>
      </div>
      <div>
        <div style="background:#DDD7C7;height:56px;border:1px solid var(--ink-500);"></div>
        <div style="margin-top:5px;font:500 11px/1.2 var(--font-sans);color:var(--ink-500);">200</div>
        <div style="font:500 10px/1.2 var(--font-mono);color:var(--paper-500);margin-top:1px;">#DDD7C7</div>
      </div>
      <div>
        <div style="background:#BCB4A0;height:56px;border:1px solid var(--ink-500);"></div>
        <div style="margin-top:5px;font:500 11px/1.2 var(--font-sans);color:var(--ink-500);">300</div>
        <div style="font:500 10px/1.2 var(--font-mono);color:var(--paper-500);margin-top:1px;">#BCB4A0</div>
      </div>
      <div>
        <div style="background:#8B836F;height:56px;border:1px solid var(--ink-500);"></div>
        <div style="margin-top:5px;font:500 11px/1.2 var(--font-sans);color:var(--ink-500);">400</div>
        <div style="font:500 10px/1.2 var(--font-mono);color:var(--paper-500);margin-top:1px;">#8B836F</div>
      </div>
      <div>
        <div style="background:#5C5648;height:56px;border:1px solid var(--ink-500);"></div>
        <div style="margin-top:5px;font:500 11px/1.2 var(--font-sans);color:var(--ink-500);">500</div>
        <div style="font:500 10px/1.2 var(--font-mono);color:var(--paper-500);margin-top:1px;">#5C5648</div>
      </div>
  </div>
      <div class="footer">
        <span class="quote">"Bone, not cream. Cool, not warm."</span>
        <span class="spec">7 STEPS · CANVAS = BONE 50</span>
      </div>
    </div>
  </div>
</body>
</html>
