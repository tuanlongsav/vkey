<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 240px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet {
    width: 100%; height: 100%;
    background: var(--paper-0);
    border: 1px solid var(--ink-500);
    padding: 16px 22px 18px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0 22px;
    align-content: start;
  }
  .stamp {
    border-right: 1px solid var(--ink-500);
    padding-right: 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer {
    margin-top: auto; padding-top: 6px;
    border-top: 1px solid var(--paper-300);
    display: flex; gap: 16px; align-items: baseline;
  }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·T2</div>
      <div class="name">Headings.</div>
      <div class="meta">Serif H1/H2 · sans H3/H4 · clear hierarchy</div>
    </div>
    <div class="body">
      
    <div style="font: 600 34px/1.14 var(--font-display); letter-spacing:-.01em;">Cài đặt nâng cao <span style="color:var(--paper-500);font:500 14px var(--font-mono);vertical-align:middle">— H1 · 34/39</span></div>
    <div style="font: 600 24px/1.22 var(--font-display); color: var(--ink-300);">Smart Switch theo ứng dụng <span style="color:var(--paper-500);font:500 13px var(--font-mono)">— H2 · 24/29</span></div>
    <div style="font: 600 18px/1.32 var(--font-sans);">Tự động khôi phục tiếng Anh <span style="color:var(--paper-500);font:500 12px var(--font-mono)">— H3 · 18/24</span></div>
    <div style="font: 600 14px/1.4 var(--font-sans);">Phím tắt thông minh <span style="color:var(--paper-500);font:500 11px var(--font-mono)">— H4 · 14/20</span></div>
      <div class="footer">
        <span class="quote">"H1 + H2 serif. H3 + H4 sans. The switch matters."</span>
        <span class="spec">HIERARCHY · 4 LEVELS · FAMILY SHIFT @H3</span>
      </div>
    </div>
  </div>
</body>
</html>
