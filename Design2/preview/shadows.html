<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 210px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet { width: 100%; height: 100%; background: var(--paper-0); border: 1px solid var(--ink-500); padding: 16px 22px 18px; box-sizing: border-box; display: grid; grid-template-columns: 90px 1fr; gap: 0 22px; align-content: start; }
  .stamp { border-right: 1px solid var(--ink-500); padding-right: 18px; display: flex; flex-direction: column; gap: 6px; }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer { margin-top: auto; padding-top: 6px; border-top: 1px solid var(--paper-300); display: flex; gap: 16px; align-items: baseline; }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·S3</div>
      <div class="name">Elevation.</div>
      <div class="meta">Subtle 4-step ramp · print-like, no glow</div>
    </div>
    <div class="body">
      
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:8px;">
      
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:4px;height:72px;box-shadow:0 1px 0 rgba(11,12,15,.04);border:1px solid var(--paper-200);"></div>
          <div style="margin-top:6px;font:500 11px var(--font-mono);color:var(--ink-500);">shadow-xs</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">no lift</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:4px;height:72px;box-shadow:0 1px 2px rgba(11,12,15,.06);border:1px solid var(--paper-200);"></div>
          <div style="margin-top:6px;font:500 11px var(--font-mono);color:var(--ink-500);">shadow-sm</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">hover</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:4px;height:72px;box-shadow:0 4px 14px -4px rgba(11,12,15,.12), 0 1px 2px rgba(11,12,15,.04);border:1px solid var(--paper-200);"></div>
          <div style="margin-top:6px;font:500 11px var(--font-mono);color:var(--ink-500);">shadow-md</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">overlay</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:4px;height:72px;box-shadow:0 18px 40px -16px rgba(11,12,15,.22), 0 2px 6px rgba(11,12,15,.06);border:1px solid var(--paper-200);"></div>
          <div style="margin-top:6px;font:500 11px var(--font-mono);color:var(--ink-500);">shadow-lg</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">window</div>
        </div>
    </div>
      <div class="footer">
        <span class="quote">"Shadows whisper. Borders shout."</span>
        <span class="spec">4 STEPS · NEUTRAL TINT · NO COLORED GLOW</span>
      </div>
    </div>
  </div>
</body>
</html>
