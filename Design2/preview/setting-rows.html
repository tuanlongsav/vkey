<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 240px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet { width: 100%; height: 100%; background: var(--paper-0); border: 1px solid var(--ink-500); padding: 16px 22px 18px; box-sizing: border-box; display: grid; grid-template-columns: 90px 1fr; gap: 0 22px; align-content: start; }
  .stamp { border-right: 1px solid var(--ink-500); padding-right: 18px; display: flex; flex-direction: column; gap: 6px; }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer { margin-top: auto; padding-top: 6px; border-top: 1px solid var(--paper-300); display: flex; gap: 16px; align-items: baseline; }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp"><div class="num">M·06</div><div class="name">Setting rows.</div><div class="meta">The core list pattern · sharp borders, no shadow</div></div>
    <div class="body">
    <div class="row-group" style="border-radius:4px;border:1px solid var(--ink-500);">
      <div class="row" style="background:var(--paper-0);">
        <div class="row__icon icon-tile--brand" style="background:var(--vkey-red-500);color:#fff;border-color:var(--vkey-red-500);"><img src="../assets/icons/keycap.svg" width="14" height="14" style="filter:invert(1)"></div>
        <div class="row__body"><div class="row__label">Bật / Tắt gõ TV</div></div>
        <input type="checkbox" class="toggle row__control" checked>
      </div>
      <div class="row" style="background:var(--paper-0);border-top:1px solid var(--paper-200);">
        <div class="row__icon" style="border:1px solid var(--ink-500);background:transparent;"><img src="../assets/icons/abc.svg" width="14" height="14"></div>
        <div class="row__body"><div class="row__label">Kiểu gõ</div></div>
        <div class="segmented row__control"><button class="is-active">Telex</button><button>VNI</button></div>
      </div>
      <div class="row" style="background:var(--paper-0);border-top:1px solid var(--paper-200);">
        <div class="row__icon" style="border:1px solid var(--ink-500);background:transparent;"><img src="../assets/icons/sparkles.svg" width="14" height="14"></div>
        <div class="row__body">
          <div class="row__label">Tự động sửa lỗi gõ nhầm</div>
          <div class="row__hint"><span style="background:var(--paper-100);font-family:var(--font-mono);font-size:11.5px;padding:1px 4px;">thfi</span> → thì &middot; <span style="background:var(--paper-100);font-family:var(--font-mono);font-size:11.5px;padding:1px 4px;">veeitj</span> → việt</div>
        </div>
        <input type="checkbox" class="toggle row__control" checked>
      </div>
    </div><div class="footer"><span class="quote">"Border separates. Shadow is for windows."</span><span class="spec">ICON 28PX · DIVIDER 1PX PAPER-200</span></div></div>
  </div>
</body>
</html>
