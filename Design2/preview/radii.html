<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 200px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet { width: 100%; height: 100%; background: var(--paper-0); border: 1px solid var(--ink-500); padding: 16px 22px 18px; box-sizing: border-box; display: grid; grid-template-columns: 90px 1fr; gap: 0 22px; align-content: start; }
  .stamp { border-right: 1px solid var(--ink-500); padding-right: 18px; display: flex; flex-direction: column; gap: 6px; }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer { margin-top: auto; padding-top: 6px; border-top: 1px solid var(--paper-300); display: flex; gap: 16px; align-items: baseline; }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·S2</div>
      <div class="name">Radii.</div>
      <div class="meta">Sharper than Tonal · max 14px before pill</div>
    </div>
    <div class="body">
      
    <div style="display:flex;gap:16px;align-items:flex-end;margin-top:4px;">
      
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--ink-500);width:62px;height:62px;border-radius:0px;"></div>
          <div style="margin-top:5px;font:500 11px var(--font-mono);color:var(--ink-500);">r-xs</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">0px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--ink-500);width:62px;height:62px;border-radius:2px;"></div>
          <div style="margin-top:5px;font:500 11px var(--font-mono);color:var(--ink-500);">r-sm</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">2px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--ink-500);width:62px;height:62px;border-radius:4px;"></div>
          <div style="margin-top:5px;font:500 11px var(--font-mono);color:var(--ink-500);">r-md</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">4px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--ink-500);width:62px;height:62px;border-radius:6px;"></div>
          <div style="margin-top:5px;font:500 11px var(--font-mono);color:var(--ink-500);">r-lg</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">6px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--ink-500);width:62px;height:62px;border-radius:10px;"></div>
          <div style="margin-top:5px;font:500 11px var(--font-mono);color:var(--ink-500);">r-xl</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">10px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--ink-500);width:62px;height:62px;border-radius:14px;"></div>
          <div style="margin-top:5px;font:500 11px var(--font-mono);color:var(--ink-500);">r-2xl</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">14px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--ink-500);width:62px;height:62px;border-radius:999px;"></div>
          <div style="margin-top:5px;font:500 11px var(--font-mono);color:var(--ink-500);">r-pill</div>
          <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">pill</div>
        </div>
    </div>
      <div class="footer">
        <span class="quote">"Corners square. Edges read like print."</span>
        <span class="spec">DEFAULT 4 · LACQUER PILL ONLY FOR TOGGLES</span>
      </div>
    </div>
  </div>
</body>
</html>
