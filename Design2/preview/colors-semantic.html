<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 210px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet {
    width: 100%; height: 100%;
    background: var(--paper-0);
    border: 1px solid var(--ink-500);
    padding: 16px 22px 18px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0 22px;
    align-content: start;
  }
  .stamp {
    border-right: 1px solid var(--ink-500);
    padding-right: 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer {
    margin-top: auto; padding-top: 6px;
    border-top: 1px solid var(--paper-300);
    display: flex; gap: 16px; align-items: baseline;
  }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·C4</div>
      <div class="name">Semantic.</div>
      <div class="meta">Cool editorial — narrow chroma, deep values</div>
    </div>
    <div class="body">
      
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
      
        <div style="border:1px solid var(--ink-500);background:var(--paper-0);">
          <div style="background:#1F7A4D;height:38px;"></div>
          <div style="background:#DDEDE2;height:20px;"></div>
          <div style="padding:5px 9px;">
            <div style="font:600 11.5px var(--font-sans)">Success</div>
            <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">#1F7A4D</div>
          </div>
        </div>
        <div style="border:1px solid var(--ink-500);background:var(--paper-0);">
          <div style="background:#B5860D;height:38px;"></div>
          <div style="background:#F1E8CD;height:20px;"></div>
          <div style="padding:5px 9px;">
            <div style="font:600 11.5px var(--font-sans)">Warning</div>
            <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">#B5860D</div>
          </div>
        </div>
        <div style="border:1px solid var(--ink-500);background:var(--paper-0);">
          <div style="background:#9F2E1C;height:38px;"></div>
          <div style="background:#FBE0DA;height:20px;"></div>
          <div style="padding:5px 9px;">
            <div style="font:600 11.5px var(--font-sans)">Danger</div>
            <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">#9F2E1C</div>
          </div>
        </div>
        <div style="border:1px solid var(--ink-500);background:var(--paper-0);">
          <div style="background:#224F8C;height:38px;"></div>
          <div style="background:#DDE5F0;height:20px;"></div>
          <div style="padding:5px 9px;">
            <div style="font:600 11.5px var(--font-sans)">Info</div>
            <div style="font:500 10px var(--font-mono);color:var(--paper-500);margin-top:1px;">#224F8C</div>
          </div>
        </div>
    </div>
      <div class="footer">
        <span class="quote">"Cool semantics, restrained chroma."</span>
        <span class="spec">STRONG ON OUTLINE · SOFT ON BACKGROUND</span>
      </div>
    </div>
  </div>
</body>
</html>
