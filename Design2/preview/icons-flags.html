<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 180px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet { width: 100%; height: 100%; background: var(--paper-0); border: 1px solid var(--ink-500); padding: 16px 22px 18px; box-sizing: border-box; display: grid; grid-template-columns: 90px 1fr; gap: 0 22px; align-content: start; }
  .stamp { border-right: 1px solid var(--ink-500); padding-right: 18px; display: flex; flex-direction: column; gap: 6px; }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer { margin-top: auto; padding-top: 6px; border-top: 1px solid var(--paper-300); display: flex; gap: 16px; align-items: baseline; }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·I3</div>
      <div class="name">Locales.</div>
      <div class="meta">Flag glyphs · no system emoji 🇻🇳 🇺🇸</div>
    </div>
    <div class="body">
      
    <div style="display:flex;gap:10px;align-items:center;margin-top:2px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--ink-500);background:var(--paper-0);">
        <img src="../assets/icons/flag-vn.svg" width="32" height="24" style="border-radius:2px;border:1px solid var(--ink-500);">
        <div><div style="font:600 13.5px var(--font-sans)">Tiếng Việt</div><div style="font:500 11px var(--font-mono);color:var(--paper-500)">vi-VN</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--ink-500);background:var(--paper-0);">
        <img src="../assets/icons/flag-us.svg" width="32" height="24" style="border-radius:2px;border:1px solid var(--ink-500);">
        <div><div style="font:600 13.5px var(--font-sans)">English</div><div style="font:500 11px var(--font-mono);color:var(--paper-500)">en-US</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--ink-500);background:var(--paper-0);color:var(--ink-500);">
        <img src="../assets/icons/globe.svg" width="24" height="24">
        <div><div style="font:600 13.5px var(--font-sans)">Auto</div><div style="font:500 11px var(--font-mono);color:var(--paper-500)">Smart Switch</div></div>
      </div>
    </div>
      <div class="footer">
        <span class="quote">"Custom flags survive any OS theme."</span>
        <span class="spec">32×24 · 2PX RADIUS · INK STROKE</span>
      </div>
    </div>
  </div>
</body>
</html>
