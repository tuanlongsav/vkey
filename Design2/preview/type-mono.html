<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 200px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet {
    width: 100%; height: 100%;
    background: var(--paper-0);
    border: 1px solid var(--ink-500);
    padding: 16px 22px 18px;
    box-sizing: border-box;
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0 22px;
    align-content: start;
  }
  .stamp {
    border-right: 1px solid var(--ink-500);
    padding-right: 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer {
    margin-top: auto; padding-top: 6px;
    border-top: 1px solid var(--paper-300);
    display: flex; gap: 16px; align-items: baseline;
  }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·T4</div>
      <div class="name">Mono.</div>
      <div class="meta">JetBrains Mono · bundle IDs, shortcuts, code</div>
    </div>
    <div class="body">
      
    <div style="font:500 14px/1.5 var(--font-mono); color: var(--ink-500);">com.anthropic.claudefordesktop</div>
    <div style="font:500 12.5px/1.5 var(--font-mono); color: var(--ink-200);">vkey-stats-diagnostic.txt · 8,960 syllables · v9</div>
    <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top: 2px;">
      <span class="keycap" style="border-radius:0;border:1px solid var(--ink-500);background:var(--paper-0);"><img src="../assets/icons/command.svg" width="13" height="13"></span>
      <span class="keycap" style="border-radius:0;border:1px solid var(--ink-500);background:var(--paper-0);"><img src="../assets/icons/shift-key.svg" width="13" height="13"></span>
      <span style="color: var(--paper-500); font:500 12px var(--font-mono); margin-left:4px;">toggle VI/EN</span>
      <span class="keycap" style="margin-left:14px;border-radius:0;border:1px solid var(--ink-500);background:var(--paper-0);">Tab</span>
      <span style="color: var(--paper-500); font:500 12px var(--font-mono);">accept prediction</span>
    </div>
      <div class="footer">
        <span class="quote">"Mono for identifiers. Never for prose."</span>
        <span class="spec">JBM 500 · 12 / 13.5 PT</span>
      </div>
    </div>
  </div>
</body>
</html>
