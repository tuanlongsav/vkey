<!doctype html>
<html lang="vi" class="theme-muc">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="../themes/muc.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-500); }
  body { width: 700px; height: 200px; padding: 0; box-sizing: border-box; overflow: hidden; font-family: var(--font-sans); }
  .sheet { width: 100%; height: 100%; background: var(--paper-0); border: 1px solid var(--ink-500); padding: 16px 22px 18px; box-sizing: border-box; display: grid; grid-template-columns: 90px 1fr; gap: 0 22px; align-content: start; }
  .stamp { border-right: 1px solid var(--ink-500); padding-right: 18px; display: flex; flex-direction: column; gap: 6px; }
  .stamp .num { font: 600 11px/1 var(--font-sans); letter-spacing: .14em; text-transform: uppercase; color: var(--vkey-red-500); }
  .stamp .name { font: 600 18px/1.1 var(--font-display); color: var(--ink-500); letter-spacing: -0.01em; }
  .stamp .meta { font: italic 400 11.5px/1.3 var(--font-display); color: var(--paper-500); margin-top: 4px; }
  .body { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .footer { margin-top: auto; padding-top: 6px; border-top: 1px solid var(--paper-300); display: flex; gap: 16px; align-items: baseline; }
  .footer .quote { font: italic 400 12px/1.3 var(--font-display); color: var(--paper-500); }
  .footer .spec { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--paper-500); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
  .row-label { font: 600 9.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase; color: var(--paper-500); display: flex; align-items: center; gap: 8px; }
  .row-label::after { content: ""; flex: 1; height: 1px; background: var(--paper-300); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="stamp">
      <div class="num">M·I2</div>
      <div class="name">Keys.</div>
      <div class="meta">Keyboard glyphs · command, shift, return, tab, esc, backspace</div>
    </div>
    <div class="body">
      
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;">
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--paper-0);border:1px solid var(--ink-500);box-shadow:var(--shadow-key);color:var(--ink-500);">
            <img src="../assets/icons/command.svg" width="26" height="26">
          </div>
          <div style="font:500 11px var(--font-mono);color:var(--paper-500);">command</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--paper-0);border:1px solid var(--ink-500);box-shadow:var(--shadow-key);color:var(--ink-500);">
            <img src="../assets/icons/shift-key.svg" width="26" height="26">
          </div>
          <div style="font:500 11px var(--font-mono);color:var(--paper-500);">shift</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--paper-0);border:1px solid var(--ink-500);box-shadow:var(--shadow-key);color:var(--ink-500);">
            <img src="../assets/icons/return-key.svg" width="26" height="26">
          </div>
          <div style="font:500 11px var(--font-mono);color:var(--paper-500);">return</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--paper-0);border:1px solid var(--ink-500);box-shadow:var(--shadow-key);color:var(--ink-500);">
            <img src="../assets/icons/tab-key.svg" width="26" height="26">
          </div>
          <div style="font:500 11px var(--font-mono);color:var(--paper-500);">tab</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--paper-0);border:1px solid var(--ink-500);box-shadow:var(--shadow-key);color:var(--ink-500);">
            <img src="../assets/icons/escape-key.svg" width="26" height="26">
          </div>
          <div style="font:500 11px var(--font-mono);color:var(--paper-500);">escape</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--paper-0);border:1px solid var(--ink-500);box-shadow:var(--shadow-key);color:var(--ink-500);">
            <img src="../assets/icons/backspace-key.svg" width="26" height="26">
          </div>
          <div style="font:500 11px var(--font-mono);color:var(--paper-500);">backspace</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:var(--paper-0);border:1px solid var(--ink-500);box-shadow:var(--shadow-key);color:var(--ink-500);">
            <img src="../assets/icons/keycap.svg" width="26" height="26">
          </div>
          <div style="font:500 11px var(--font-mono);color:var(--paper-500);">keycap</div>
        </div>
    </div>
      <div class="footer">
        <span class="quote">"Glyph first, label second."</span>
        <span class="spec">52PX KEYCAP · 26PX GLYPH · INSET SHADOW</span>
      </div>
    </div>
  </div>
</body>
</html>
