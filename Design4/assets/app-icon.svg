<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    
    <clipPath id="vk-squircle">
      <path d="M 256 8&#xA;               C 96 8, 8 96, 8 256&#xA;               C 8 416, 96 504, 256 504&#xA;               C 416 504, 504 416, 504 256&#xA;               C 504 96, 416 8, 256 8 Z"></path>
    </clipPath>

    
    <radialGradient id="vk-body" cx="35%" cy="20%" r="95%">
      <stop offset="0%" stop-color="#FF8676"></stop>
      <stop offset="30%" stop-color="#EE5A47"></stop>
      <stop offset="62%" stop-color="#D63622"></stop>
      <stop offset="100%" stop-color="#7A1A0E"></stop>
    </radialGradient>

    
    <linearGradient id="vk-gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"></stop>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>

    
    <linearGradient id="vk-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.30"></stop>
    </linearGradient>

    
    <radialGradient id="vk-inner" cx="50%" cy="50%" r="60%">
      <stop offset="70%" stop-color="#000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"></stop>
    </radialGradient>

    
    <linearGradient id="vk-text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="55%" stop-color="#FCE9DF"></stop>
      <stop offset="100%" stop-color="#FFB89F"></stop>
    </linearGradient>

    
    <linearGradient id="vk-spec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"></stop>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.15"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>

    
    <filter id="vk-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"></feGaussianBlur>
    </filter>
  </defs>

  
  <ellipse cx="256" cy="490" rx="190" ry="14" fill="#000" opacity="0.25" filter="url(#vk-soft)"></ellipse>

  <g clip-path="url(#vk-squircle)">
    
    <rect x="0" y="0" width="512" height="512" fill="url(#vk-body)"></rect>

    
    <ellipse cx="160" cy="120" rx="220" ry="140" fill="#FFC5A0" opacity="0.45" filter="url(#vk-soft)"></ellipse>

    
    <rect x="0" y="0" width="512" height="512" fill="url(#vk-inner)"></rect>

    
    <path d="M 0 0 L 512 0 L 512 220 C 380 280, 132 280, 0 220 Z" fill="url(#vk-gloss)"></path>

    
    <rect x="0" y="350" width="512" height="162" fill="url(#vk-rim)"></rect>

    
    <g transform="translate(256 296)" text-anchor="middle">
      
      <text y="0" fill="#000" opacity="0.35" font-family="-apple-system, &#39;SF Pro Display&#39;, &#39;Be Vietnam Pro&#39;, system-ui, sans-serif" font-size="200" font-weight="800" letter-spacing="-8" dy="0.15em">Vkey</text>
      
      <text y="0" fill="url(#vk-text)" font-family="-apple-system, &#39;SF Pro Display&#39;, &#39;Be Vietnam Pro&#39;, system-ui, sans-serif" font-size="200" font-weight="800" letter-spacing="-8">Vkey</text>
      
      <text y="0" fill="url(#vk-spec)" font-family="-apple-system, &#39;SF Pro Display&#39;, &#39;Be Vietnam Pro&#39;, system-ui, sans-serif" font-size="200" font-weight="800" letter-spacing="-8">Vkey</text>
    </g>

    
    <circle cx="172" cy="226" r="6" fill="#FFE9B0" opacity="0.7"></circle>
  </g>

  
  <path d="M 256 8 C 96 8, 8 96, 8 256 C 8 416, 96 504, 256 504 C 416 504, 504 416, 504 256 C 504 96, 416 8, 256 8 Z" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"></path>
  <path d="M 256 8 C 96 8, 8 96, 8 256" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"></path>
</svg>