<!doctype html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>vkey 3D · Liquid Glass</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="styles/glass.css"/>
<link rel="stylesheet" href="styles/surfaces.css"/>
<link rel="stylesheet" href="styles/surfaces2.css"/>
<style>
  /* Desktop background — used inside every artboard so glass refracts */
  .desk-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(60% 50% at 20% 20%, #6b3e8f 0%, transparent 55%),
      radial-gradient(50% 50% at 80% 30%, #c34a4a 0%, transparent 55%),
      radial-gradient(70% 60% at 50% 90%, #2a5fa5 0%, transparent 60%),
      linear-gradient(180deg, #1a0e2c, #0a0b14);
    overflow: hidden;
  }
  .desk-bg::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(2px 2px at 12% 38%, rgba(255,255,255,0.55), transparent),
      radial-gradient(1.5px 1.5px at 78% 22%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 42% 78%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 88% 64%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 22% 88%, rgba(255,255,255,0.35), transparent);
  }
  .desk-bg.warm {
    background:
      radial-gradient(60% 50% at 25% 30%, #f59055 0%, transparent 60%),
      radial-gradient(50% 50% at 75% 25%, #d63b66 0%, transparent 55%),
      radial-gradient(70% 60% at 50% 80%, #4f2a8c 0%, transparent 60%),
      linear-gradient(180deg, #2a142a, #0d0814);
  }
  .desk-bg.cool {
    background:
      radial-gradient(60% 50% at 20% 25%, #1a72c9 0%, transparent 60%),
      radial-gradient(50% 50% at 80% 30%, #2bb673 0%, transparent 55%),
      radial-gradient(70% 60% at 50% 85%, #0c2d72 0%, transparent 60%),
      linear-gradient(180deg, #061226, #050811);
  }
  .desk-bg.amber {
    background:
      radial-gradient(60% 50% at 30% 25%, #ffa84a 0%, transparent 60%),
      radial-gradient(50% 50% at 75% 30%, #c8341f 0%, transparent 55%),
      radial-gradient(70% 60% at 50% 80%, #4a1408 0%, transparent 60%),
      linear-gradient(180deg, #200a08, #0a0608);
  }
  .artboard-inner {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
    border-radius: 12px;
  }
  .center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .stack-v {
    display: flex; flex-direction: column; gap: 22px;
    align-items: center; justify-content: center;
    width: 100%; height: 100%;
    padding: 32px;
  }
  .menu-anchor {
    position: absolute; top: 28px; left: 24px;
  }
  .menu-arrow {
    position: absolute;
    top: 8px; left: 36px;
    width: 12px; height: 12px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)),
      rgba(28, 30, 38, 0.55);
    transform: rotate(45deg);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.30);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
