<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:10px;">
    <div class="eyebrow">Callouts &amp; helper hints</div>
    <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--info-soft);border-radius:10px;color:#1A579E;">
      <img src="../assets/icons/info-circle.svg" width="18" height="18" style="margin-top:1px;flex:none">
      <div style="font:var(--t-body)">Nếu app không có trong danh sách "đang chạy", paste Bundle ID phía trên.</div>
    </div>
    <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--warning-soft);border-radius:10px;color:#7E5B07;">
      <img src="../assets/icons/lightbulb.svg" width="18" height="18" style="margin-top:1px;flex:none">
      <div style="font:var(--t-body)">Có 5 từ bạn gõ ≥10 lần có thể đặt thành viết tắt — bấm <b>Xem &amp; thêm</b>.</div>
    </div>
  </div>
</div></body></html>
