<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 160px; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style>
</head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:10px">Accent · Saigon gold (use sparingly, for stars / highlights / new badges)</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
      
        <div>
          <div style="background:#FAD37A;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Gold 300</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#FAD37A</div>
        </div>
        <div>
          <div style="background:#F5C645;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Gold 400</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#F5C645</div>
        </div>
        <div>
          <div style="background:#E5AE1C;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Gold 500</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#E5AE1C</div>
        </div>
        <div>
          <div style="background:#B5860D;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Gold 600</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#B5860D</div>
        </div>
    </div>
  </div></div></body></html>
