<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:14px;">
    <div class="eyebrow">Badges &amp; state chips</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <span class="badge badge--brand">v2.0.2</span>
      <span class="badge badge--success">Stable</span>
      <span class="badge badge--info">Beta</span>
      <span class="badge badge--warning">Preview</span>
      <span class="badge badge--danger">Deprecated</span>
      <span class="badge">8,960 syllables</span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;font:var(--t-body)">
      <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--bg-sunken)"><img src="../assets/icons/user.svg" width="14" height="14">Người dùng đặt</span>
      <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--bg-sunken)"><img src="../assets/icons/robot.svg" width="14" height="14">vkey tự học</span>
      <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--bg-sunken)"><img src="../assets/icons/lock.svg" width="14" height="14">Khóa</span>
    </div>
  </div>
</div></body></html>
