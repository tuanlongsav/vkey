<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 200px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:18px">Elevation</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;">
      
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:14px;height:84px;box-shadow:var(--shadow-xs);"></div>
          <div style="margin-top:8px;font:var(--t-mono-sm);color:var(--fg-2);">--shadow-xs</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:14px;height:84px;box-shadow:var(--shadow-sm);"></div>
          <div style="margin-top:8px;font:var(--t-mono-sm);color:var(--fg-2);">--shadow-sm</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:14px;height:84px;box-shadow:var(--shadow-md);"></div>
          <div style="margin-top:8px;font:var(--t-mono-sm);color:var(--fg-2);">--shadow-md</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-0);border-radius:14px;height:84px;box-shadow:var(--shadow-lg);"></div>
          <div style="margin-top:8px;font:var(--t-mono-sm);color:var(--fg-2);">--shadow-lg</div>
        </div>
    </div>
  </div>
</div></body></html>
