<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 160px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:10px;">
    <div class="eyebrow">Locale flags (custom SVG · replaces emoji 🇻🇳 🇺🇸)</div>
    <div style="display:flex;gap:18px;align-items:center;">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border-1);border-radius:10px;background:var(--bg-elevated);">
        <img src="../assets/icons/flag-vn.svg" width="32" height="24" style="border-radius:3px;">
        <div><div style="font:var(--t-h4)">Tiếng Việt</div><div style="font:var(--t-mono-sm);color:var(--fg-muted)">vi-VN</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border-1);border-radius:10px;background:var(--bg-elevated);">
        <img src="../assets/icons/flag-us.svg" width="32" height="24" style="border-radius:3px;">
        <div><div style="font:var(--t-h4)">English</div><div style="font:var(--t-mono-sm);color:var(--fg-muted)">en-US</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border-1);border-radius:10px;background:var(--bg-elevated);color:var(--fg-1);">
        <img src="../assets/icons/globe.svg" width="24" height="24">
        <div><div style="font:var(--t-h4)">Auto-detect</div><div style="font:var(--t-mono-sm);color:var(--fg-muted)">Smart Switch</div></div>
      </div>
    </div>
  </div>
</div></body></html>
