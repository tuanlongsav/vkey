<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 200px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:14px">Spacing scale · 4px base</div>
    <div style="display:flex;align-items:flex-end;gap:16px;">
      
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:4px;height:4px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-1</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">4px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:8px;height:8px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-2</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">8px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:12px;height:12px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-3</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">12px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:16px;height:16px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-4</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">16px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:20px;height:20px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-5</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">20px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:24px;height:24px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-6</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">24px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:32px;height:32px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-7</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">32px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:40px;height:40px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-8</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">40px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:56px;height:56px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-9</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">56px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--vkey-red-500);width:72px;height:72px;border-radius:2px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--s-10</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">72px</div>
        </div>
    </div>
  </div>
</div></body></html>
