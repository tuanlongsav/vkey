<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:12px;">
    <div class="eyebrow">Inputs</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
      <input class="input" placeholder="com.example.app" value="com.anthropic.claudefordesktop" style="width:280px;">
      <button class="btn btn--primary"><img src="../assets/icons/plus.svg" style="filter:invert(1)">Thêm</button>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <div style="position:relative;width:280px;">
        <img src="../assets/icons/search.svg" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--fg-3);">
        <input class="input" placeholder="Tìm app đang chạy..." style="width:100%;padding-left:34px;">
      </div>
      <input class="input" placeholder="Viết tắt" value="kga" style="width:120px;">
      <span style="color:var(--fg-muted)">→</span>
      <input class="input" placeholder="Cụm dài" value="Kính gửi anh" style="width:200px;">
    </div>
  </div>
</div></body></html>
