<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 170px; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style>

        <div>
          <div style="background:#FEF1EE;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Red 50</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#FEF1EE</div>
        </div>
        <div>
          <div style="background:#F8B6A6;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>

          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#F8B6A6</div>
        </div>
        <div>
          <div style="background:#EB6249;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Red 400</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#EB6249</div>
        </div>
        <div>
          <div style="background:#E04434;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Red 500</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#E04434</div>
        </div>
        <div>
          <div style="background:#C8341F;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Red 600</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#C8341F</div>
        </div>
        <div>
          <div style="background:#A52817;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>

        </div>
        <div>

          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#561811</div>
        </div>
    </div>
