<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 170px; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style>
</head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:10px">Neutrals · Deep ink (dark mode)</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">
      
        <div>
          <div style="background:#6A6E78;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Ink 50</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#6A6E78</div>
        </div>
        <div>
          <div style="background:#4B4F58;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Ink 100</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#4B4F58</div>
        </div>
        <div>
          <div style="background:#353841;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Ink 200</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#353841</div>
        </div>
        <div>
          <div style="background:#24272E;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Ink 300</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#24272E</div>
        </div>
        <div>
          <div style="background:#1A1C22;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Ink 400</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#1A1C22</div>
        </div>
        <div>
          <div style="background:#131519;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Ink 500</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#131519</div>
        </div>
        <div>
          <div style="background:#0E0F12;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Ink 600</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#0E0F12</div>
        </div>
    </div>
  </div></div></body></html>
