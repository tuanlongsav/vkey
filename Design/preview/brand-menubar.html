<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 130px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:12px;">
    <div class="eyebrow">Menu bar icon states (16/18pt monochrome + VN/EN/locked/needs-perm)</div>
    <div style="display:flex;gap:12px;">
      
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#1f2126;color:#fff;">
          <img src="../assets/icons/flag-vn.svg" width="18" height="18" style="filter:invert(1);filter:none;border-radius:2px">
          <span style="font:var(--t-mono-sm)">VI mode</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#1f2126;color:#fff;">
          <img src="../assets/icons/flag-us.svg" width="18" height="18" style="filter:invert(1);filter:none;border-radius:2px">
          <span style="font:var(--t-mono-sm)">EN mode</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#1f2126;color:#fff;">
          <img src="../assets/icons/lock.svg" width="18" height="18" style="filter:invert(1);">
          <span style="font:var(--t-mono-sm)">Secure input</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#1f2126;color:#fff;">
          <img src="../assets/icons/alert-triangle.svg" width="18" height="18" style="filter:invert(1);">
          <span style="font:var(--t-mono-sm)">No A11y perm</span>
        </div>
    </div>
  </div>
</div></body></html>
