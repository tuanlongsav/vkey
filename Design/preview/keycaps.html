<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:14px;">
    <div class="eyebrow">Keycap component · for shortcut display</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <span class="keycap"><img src="../assets/icons/command.svg" width="13" height="13" style="opacity:.8"></span>
      <span class="keycap"><img src="../assets/icons/shift-key.svg" width="13" height="13" style="opacity:.8"></span>
      <span class="keycap">V</span>
      <span style="color:var(--fg-muted)">— commit VI/EN</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <span class="keycap keycap--lg"><img src="../assets/icons/tab-key.svg" width="18" height="18"></span>
      <span style="color:var(--fg-muted);font:var(--t-body)">accept next-word prediction</span>
      <span class="keycap keycap--lg" style="margin-left:14px"><img src="../assets/icons/escape-key.svg" width="18" height="18"></span>
      <span style="color:var(--fg-muted);font:var(--t-body)">revert buffer</span>
    </div>
  </div>
</div></body></html>
