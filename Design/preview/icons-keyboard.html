<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:14px">Keyboard glyphs</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;">
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--paper-100);box-shadow:var(--shadow-key);color:var(--fg-1);"><img src="../assets/icons/command.svg" width="26" height="26"></div>
          <div style="font:var(--t-mono-sm);color:var(--fg-2);">command</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--paper-100);box-shadow:var(--shadow-key);color:var(--fg-1);"><img src="../assets/icons/shift-key.svg" width="26" height="26"></div>
          <div style="font:var(--t-mono-sm);color:var(--fg-2);">shift-key</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--paper-100);box-shadow:var(--shadow-key);color:var(--fg-1);"><img src="../assets/icons/return-key.svg" width="26" height="26"></div>
          <div style="font:var(--t-mono-sm);color:var(--fg-2);">return-key</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--paper-100);box-shadow:var(--shadow-key);color:var(--fg-1);"><img src="../assets/icons/tab-key.svg" width="26" height="26"></div>
          <div style="font:var(--t-mono-sm);color:var(--fg-2);">tab-key</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--paper-100);box-shadow:var(--shadow-key);color:var(--fg-1);"><img src="../assets/icons/escape-key.svg" width="26" height="26"></div>
          <div style="font:var(--t-mono-sm);color:var(--fg-2);">escape-key</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--paper-100);box-shadow:var(--shadow-key);color:var(--fg-1);"><img src="../assets/icons/backspace-key.svg" width="26" height="26"></div>
          <div style="font:var(--t-mono-sm);color:var(--fg-2);">backspace-key</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:10px;background:var(--paper-100);box-shadow:var(--shadow-key);color:var(--fg-1);"><img src="../assets/icons/keycap.svg" width="26" height="26"></div>
          <div style="font:var(--t-mono-sm);color:var(--fg-2);">keycap</div>
        </div>
    </div>
  </div>
</div></body></html>
