<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:12px;">
    <div class="eyebrow">Buttons</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn--primary">Tải về DMG</button>
      <button class="btn btn--secondary"><img src="../assets/icons/download.svg">Cập nhật từ điển</button>
      <button class="btn btn--ghost"><img src="../assets/icons/refresh.svg">Làm mới</button>
      <button class="btn btn--danger"><img src="../assets/icons/trash.svg">Xoá</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn--primary btn--sm">+ Thêm</button>
      <button class="btn btn--secondary btn--sm">Sửa</button>
      <button class="btn btn--primary btn--lg">Xem trên GitHub</button>
    </div>
  </div>
</div></body></html>
