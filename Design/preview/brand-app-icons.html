<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 220px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">

      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">

      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">

      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">

      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">

        <div style="font:var(--t-mono-sm);color:var(--fg-muted)">28px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <img src="../assets/logo/vkey-app-icon.svg" width="18" height="18" style="border-radius:4.5px;">
        <div style="font:var(--t-mono-sm);color:var(--fg-muted)">18px</div>
      </div>
  </div>
</div></body></html>
