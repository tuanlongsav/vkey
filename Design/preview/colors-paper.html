<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 170px; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style>
</head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:10px">Neutrals · Warm paper (light mode)</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">
      
        <div>
          <div style="background:#FFFFFF;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Paper 0</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#FFFFFF</div>
        </div>
        <div>
          <div style="background:#FAF8F4;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Paper 50</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#FAF8F4</div>
        </div>
        <div>
          <div style="background:#F2EFE8;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Paper 100</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#F2EFE8</div>
        </div>
        <div>
          <div style="background:#E6E1D6;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Paper 200</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#E6E1D6</div>
        </div>
        <div>
          <div style="background:#D2CCBC;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Paper 300</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#D2CCBC</div>
        </div>
        <div>
          <div style="background:#A8A293;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Paper 400</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#A8A293</div>
        </div>
        <div>
          <div style="background:#7C7768;border-radius:10px;height:72px;border:1px solid var(--border-1);"></div>
          <div style="margin-top:8px;font:var(--t-micro);color:var(--fg-2);">Paper 500</div>
          <div style="font:var(--t-mono-sm);color:var(--fg-muted);">#7C7768</div>
        </div>
    </div>
  </div></div></body></html>
