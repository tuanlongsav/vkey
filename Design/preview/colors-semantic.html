<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style>
</head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:10px">Semantic</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
      
        <div style="border:1px solid var(--border-1);border-radius:10px;overflow:hidden;">
          <div style="background:#2BB673;height:42px;"></div>
          <div style="background:#DCF3E7;height:22px;"></div>
          <div style="padding:6px 10px;">
            <div style="font:var(--t-h4)">Success</div>
            <div style="font:var(--t-mono-sm);color:var(--fg-muted)">#2BB673</div>
          </div>
        </div>
        <div style="border:1px solid var(--border-1);border-radius:10px;overflow:hidden;">
          <div style="background:#E5AE1C;height:42px;"></div>
          <div style="background:#FAF1D6;height:22px;"></div>
          <div style="padding:6px 10px;">
            <div style="font:var(--t-h4)">Warning</div>
            <div style="font:var(--t-mono-sm);color:var(--fg-muted)">#E5AE1C</div>
          </div>
        </div>
        <div style="border:1px solid var(--border-1);border-radius:10px;overflow:hidden;">
          <div style="background:#D9344A;height:42px;"></div>
          <div style="background:#FBE0E3;height:22px;"></div>
          <div style="padding:6px 10px;">
            <div style="font:var(--t-h4)">Danger</div>
            <div style="font:var(--t-mono-sm);color:var(--fg-muted)">#D9344A</div>
          </div>
        </div>
        <div style="border:1px solid var(--border-1);border-radius:10px;overflow:hidden;">
          <div style="background:#2D89E5;height:42px;"></div>
          <div style="background:#DDEBF9;height:22px;"></div>
          <div style="padding:6px 10px;">
            <div style="font:var(--t-h4)">Info</div>
            <div style="font:var(--t-mono-sm);color:var(--fg-muted)">#2D89E5</div>
          </div>
        </div>
    </div>
  </div>
</div></body></html>
