<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;display:flex;flex-direction:column;gap:14px;">
    <div class="eyebrow">Segmented + tabs</div>
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;">
      <div class="segmented"><button class="is-active">Telex</button><button>VNI</button></div>
      <div class="segmented"><button>Kiểu cũ</button><button class="is-active">Kiểu mới</button></div>
      <div class="segmented"><button>Ưu tiên VI</button><button class="is-active">Cân bằng</button><button>Ưu tiên EN</button></div>
    </div>
    <div class="tabs" style="width:fit-content;">
      <button class="tab" aria-selected="true"><img src="../assets/icons/gear.svg">Chung</button>
      <button class="tab"><img src="../assets/icons/shuffle.svg">Smart Switch</button>
      <button class="tab"><img src="../assets/icons/sparkles.svg">Macro</button>
      <button class="tab"><img src="../assets/icons/check-circle.svg">Chính tả</button>
      <button class="tab"><img src="../assets/icons/chart-bar.svg">Thống kê</button>
    </div>
  </div>
</div></body></html>
