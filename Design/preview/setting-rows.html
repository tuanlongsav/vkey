<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 240px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:10px">Setting row · the core list pattern</div>
    <div class="row-group">
      <div class="row">
        <div class="row__icon" style="background:color-mix(in srgb, var(--vkey-red-500) 14%, transparent);color:var(--vkey-red-600)"><img src="../assets/icons/keycap.svg"></div>
        <div class="row__body"><div class="row__label">Bật / Tắt gõ TV</div></div>
        <input type="checkbox" class="toggle row__control" checked>
      </div>
      <div class="row">
        <div class="row__icon"><img src="../assets/icons/abc.svg"></div>
        <div class="row__body"><div class="row__label">Kiểu gõ</div></div>
        <div class="segmented row__control"><button class="is-active">Telex</button><button>VNI</button></div>
      </div>
      <div class="row">
        <div class="row__icon"><img src="../assets/icons/sparkles.svg"></div>
        <div class="row__body"><div class="row__label">Tự động sửa lỗi gõ nhầm</div><div class="row__hint">thfi → thì · veeitj → việt · phuowgn → phương</div></div>
        <input type="checkbox" class="toggle row__control" checked>
      </div>
    </div>
  </div>
</div></body></html>
