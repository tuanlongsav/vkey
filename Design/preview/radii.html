<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { width: 700px; height: 180px; padding: 18px 22px; box-sizing: border-box; overflow: hidden; }
  .card { width: 100%; height: 100%; display: flex; }
  
</style></head><body><div class="card">
  <div style="width:100%;">
    <div class="eyebrow" style="margin-bottom:14px">Corner radii</div>
    <div style="display:flex;gap:14px;align-items:flex-end;">
      
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--border-1);width:72px;height:72px;border-radius:4px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--r-xs</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">4px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--border-1);width:72px;height:72px;border-radius:6px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--r-sm</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">6px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--border-1);width:72px;height:72px;border-radius:10px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--r-md</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">10px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--border-1);width:72px;height:72px;border-radius:14px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--r-lg</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">14px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--border-1);width:72px;height:72px;border-radius:20px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--r-xl</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">20px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--border-1);width:72px;height:72px;border-radius:28px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--r-2xl</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">28px</div>
        </div>
        <div style="text-align:center;">
          <div style="background:var(--paper-100);border:1px solid var(--border-1);width:72px;height:72px;border-radius:999px;"></div>
          <div style="margin-top:6px;font:var(--t-mono-sm);color:var(--fg-2);">--r-pill</div>
          <div style="font:var(--t-micro);color:var(--fg-muted);">pill</div>
        </div>
    </div>
  </div>
</div></body></html>
