# cbindgen config for vkey_core.h generation.
# Run via: cbindgen --config cbindgen.toml --crate vkey_core --output include/vkey_core.h

language = "C"
header = "// Auto-generated by cbindgen — do not edit by hand."
include_guard = "VKEY_CORE_H"
autogen_warning = "// This header was auto-generated by cbindgen — DO NOT EDIT MANUALLY"
cpp_compat = true
pragma_once = true

[export]
# Only export functions prefixed with `vkey_` to avoid leaking internals.
prefix = "vkey_"

[parse]
parse_deps = false
